---
# TODO: integrate into matrix.os in pr-ci.yml
# TODO: add NetBSD and DragonFlyBSD
name: 'Build (FreeBSD)'
on:
  push:
    branches:
      - master
      - 'fuse-[0-9]+.[0-9]+*'
  pull_request:
    branches:
      - master
      - 'fuse-[0-9]+.[0-9]+*'

jobs:
  build_bsd:
    runs-on: ubuntu-latest
    name: Build under FreeBSD
    steps:
    - name: Checkout
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    - name: Build
      uses: vmactions/freebsd-vm@77ed28d336d03fe19a3f4f7266c1d2c4714dd79d # v1
      with:
        usesh: true
        prepare: |
          pkg install -y meson ninja
        run: |
          mkdir build
          cd build
          meson setup ..
          ninja -v
...