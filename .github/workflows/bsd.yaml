---
# TODO: integrate into matrix.os in pr-ci.yml
# TODO: add NetBSD and DragonFlyBSD
name: 'Build (FreeBSD)'
on:
  push:
    branches:
      - master
      - 'fuse-[0-9]+.[0-9]+*'
  pull_request:
    branches:
      - master
      - 'fuse-[0-9]+.[0-9]+*'

jobs:
  build_bsd:
    runs-on: ubuntu-latest
    name: Build under FreeBSD
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: Build
      uses: vmactions/freebsd-vm@a6de9343ef5747433d9c25784c90e84998b9d69a # v1
      with:
        usesh: true
        prepare: |
          pkg install -y meson ninja
        run: |
          mkdir build
          cd build
          meson setup ..
          ninja -v
...